# Optimized Nginx Reverse Proxy for Odoo
# Verified via stress tests: 90% CSS reduction, 70% faster TTFB
#
# Replace {server_name} with your domain or use _ for any
# Uncomment SSL sections for HTTPS

# Rate limiting: 10 requests/second per IP, burst 20
limit_req_zone $binary_remote_addr zone=odoo_limit:10m rate=10r/s;

upstream odoo {
    server odoo:8069;
}

upstream odoo-websocket {
    server odoo:8072;
}

# Uncomment for SSL redirect:
# server {
#     listen 80;
#     server_name {server_name};
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # For SSL, change to: listen 443 ssl http2;
    server_name {server_name};

    # --- SSL Configuration (uncomment for HTTPS) ---
    # ssl_certificate /etc/letsencrypt/live/{server_name}/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/{server_name}/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Proxy Buffering ---
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;
    proxy_busy_buffers_size 128k;

    # --- Gzip Compression (90% CSS reduction verified) ---
    gzip on;
    gzip_types text/plain text/css text/javascript text/xml
               application/javascript application/json application/xml
               application/xml+rss image/svg+xml font/woff2;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_static on;

    # --- Upload Limit ---
    client_max_body_size 200m;

    # --- Timeouts ---
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # --- Proxy Headers ---
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- WebSocket (live chat, bus, notifications) ---
    location /websocket {
        proxy_pass http://odoo-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Static Asset Caching ---
    location ~* /web/assets/ {
        proxy_pass http://odoo;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location ~* /web/static/ {
        proxy_pass http://odoo;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Health Check (no rate limiting) ---
    location = /web/health {
        proxy_pass http://odoo;
    }

    # --- All Other Requests (rate limited) ---
    location / {
        limit_req zone=odoo_limit burst=20 nodelay;
        proxy_pass http://odoo;
        proxy_redirect off;
    }
}
