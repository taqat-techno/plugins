# Production Docker Compose Template for Odoo
# Includes: nginx reverse proxy, PostgreSQL tuning, resource limits, warm-up service
# Replace all {placeholders} before use
#
# Placeholders:
#   {postgres_image}  - e.g., postgres:16
#   {version}         - e.g., 19
#   {project_name}    - e.g., relief_center
#   {odoo_image}      - e.g., taqatechno/odoo:19.0-enterprise

services:
  db:
    image: {postgres_image}
    container_name: {project_name}_{version}_db
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - {project_name}_{version}_db_data:/var/lib/postgresql/data
    shm_size: '256m'
    networks:
      - {project_name}_{version}_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    restart: unless-stopped

  odoo:
    image: {odoo_image}
    container_name: {project_name}_{version}_web
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sources/odoo-{version}:/opt/odoo/source:ro
      - ./projects/{project_name}:/opt/odoo/custom-addons/{project_name}:ro
      - ./conf/{project_name}.conf:/etc/odoo/odoo.conf:ro
      - ./logs/{project_name}:/var/log/odoo
      - {project_name}_{version}_data:/var/lib/odoo
    expose:
      - "8069"
      - "8072"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      DEV_MODE: "0"
      ENABLE_DEBUGGER: "0"
    networks:
      - {project_name}_{version}_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || curl -sf http://localhost:8069/web/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: {project_name}_{version}_nginx
    volumes:
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      # Uncomment for SSL:
      # - "443:443"
    depends_on:
      odoo:
        condition: service_healthy
    networks:
      - {project_name}_{version}_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  warmup:
    image: curlimages/curl:latest
    container_name: {project_name}_{version}_warmup
    depends_on:
      odoo:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Warming up Odoo assets..."
        sleep 10
        curl -sf http://odoo:8069/web/login > /dev/null 2>&1 || true
        curl -sf http://odoo:8069/shop > /dev/null 2>&1 || true
        echo "Warm-up complete."
    networks:
      - {project_name}_{version}_net
    restart: "no"

volumes:
  {project_name}_{version}_db_data:
  {project_name}_{version}_data:

networks:
  {project_name}_{version}_net:
    driver: bridge
